<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ RK Restaurant | Premium Dining</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:white;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background: radial-gradient(circle,#1a1a1a,#000);
}
.hero h1{
  font-size:60px;
  color:gold;
}
.hero p{
  color:#aaa;
}

/* NAV */
.nav{
  position:sticky;
  top:0;
  background:#000;
  padding:10px;
  display:flex;
  gap:15px;
  overflow-x:auto;
  border-bottom:1px solid #222;
}
.nav a{
  color:#ccc;
  text-decoration:none;
  white-space:nowrap;
}
.nav a:hover{
  color:gold;
}

/* SECTION */
.section{
  padding:30px;
}
h2{
  border-bottom:1px solid #333;
  padding-bottom:5px;
}

/* 🔥 PERFECT GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 220px));
  gap:20px;
  justify-content:start;
}

/* CARD */
.card{
  width:220px;
  background:#111;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}
.card-content{
  padding:10px;
}
.price{
  color:gold;
}

/* BUTTON */
button{
  background:#16a34a;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
}

/* CART */
.cart{
  background:#111;
  padding:20px;
  margin:30px;
  border-radius:12px;
}

/* REVIEWS */
.reviews{
  background:#111;
  margin:30px;
  padding:20px;
  border-radius:12px;
}
.review{
  background:#222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>🍽️ RK Restaurant</h1>
  <p>Premium Highway Dining Experience</p>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- MENU -->
<div id="menu"></div>

<!-- CART -->
<div class="cart">
  <h2>Your Order</h2>
  <div id="cartItems"></div>
  <p id="total"></p>
</div>

<!-- REVIEWS -->
<div class="reviews">
  <h2>Customer Reviews</h2>
  <div class="review">⭐️⭐️⭐️⭐️⭐️ Amazing food!</div>
  <div class="review">⭐️⭐️⭐️⭐️ Great experience</div>
  <div class="review">⭐️⭐️⭐️⭐️⭐️ Loved it</div>
</div>

<script>

const menuData={
"Biryani":["Chicken Biryani","Mutton Biryani","Egg Biryani","Veg Biryani","Paneer Biryani"],
"Non-Veg":["Butter Chicken","Chicken Curry","Grilled Chicken","Chicken Masala","Fish Curry"],
"Veg":["Paneer Butter Masala","Dal Fry","Jeera Rice","Veg Curry","Mushroom Masala"],
"Fast Food":["Burger","Pizza","Fries","Sandwich","Chicken Wings"],
"Desserts":["Ice Cream","Brownie","Cake","Gulab Jamun","Falooda"],
"Drinks":["Coke","Sprite","Lemon Soda","Cold Coffee","Milkshake"]
};

let cart=[];

function updateCart(){
  let c=document.getElementById("cartItems");
  let t=document.getElementById("total");
  c.innerHTML="";
  let total=0;

  cart.forEach(i=>{
    c.innerHTML+=`<p>${i.name} - ₹${i.price}</p>`;
    total+=i.price;
  });

  t.innerText="Total: ₹"+total;
}

function add(name,price){
  cart.push({name,price});
  updateCart();
}

const menu=document.getElementById("menu");
const nav=document.getElementById("nav");

Object.keys(menuData).forEach(cat=>{

  let link=document.createElement("a");
  link.href="#"+cat;
  link.innerText=cat;
  nav.appendChild(link);

  let section=document.createElement("div");
  section.className="section";
  section.id=cat;

  let title=document.createElement("h2");
  title.innerText=cat;
  section.appendChild(title);

  let grid=document.createElement("div");
  grid.className="grid";

  menuData[cat].forEach(item=>{
    let price=Math.floor(120+Math.random()*200);

    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="https://source.unsplash.com/300x200/?food,${item}">
      <div class="card-content">
        <h3>${item}</h3>
        <p class="price">₹${price}</p>
        <button onclick="add('${item}',${price})">Add</button>
      </div>
    `;

    grid.appendChild(card);
  });

  section.appendChild(grid);
  menu.appendChild(section);

});

</script>

</body>
</html>
