<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ RK Restaurant | Premium Dining</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:white;
}

/* NAVBAR */
nav{
  background:#000;
  padding:15px;
  text-align:center;
  border-bottom:1px solid gold;
}
nav h1{
  color:gold;
  letter-spacing:2px;
}
nav span{
  font-size:20px;
}

/* SECTION */
.section{
  padding:60px 30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

/* CARD */
.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,215,0,0.1);
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px gold;
}
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}
.card-content{
  padding:15px;
}
.price{
  color:gold;
}
button{
  background:gold;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

/* CART */
.cart{
  position:fixed;
  right:20px;
  bottom:20px;
  width:260px;
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* REVIEWS */
.review{
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

h2{
  color:gold;
}
</style>
</head>

<body>

<nav>
<h1>🍽️ RK RESTAURANT 🍴</h1>
<span>⭐⭐⭐⭐⭐ Premium Dining Experience</span>
</nav>

<div class="section">
<h2>🍛 MENU (50+ ITEMS)</h2>

<div class="grid" id="menu"></div>
</div>

<!-- REVIEWS -->
<div class="section">
<h2>⭐ Customer Reviews</h2>

<div class="review">⭐⭐⭐⭐⭐ Amazing food and service!</div>
<div class="review">⭐⭐⭐⭐ Best biryani in town 🔥</div>
<div class="review">⭐⭐⭐⭐⭐ Premium ambience & taste</div>

</div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h4>Total ₹<span id="total">0</span></h4>
</div>

<script>

let cart=[];
let total=0;

/* 50+ ITEMS */
const items=[
["Chicken Biryani",220],["Mutton Biryani",280],["Egg Biryani",180],
["Paneer Biryani",190],["Veg Biryani",160],
["Chicken 65",180],["Chilli Chicken",200],["Dragon Chicken",220],
["Paneer Tikka",160],["Gobi Manchurian",140],
["Veg Noodles",120],["Chicken Noodles",150],
["Veg Fried Rice",130],["Chicken Fried Rice",160],
["Burger",120],["Chicken Burger",150],
["Pizza Veg",200],["Pizza Chicken",250],
["French Fries",100],["Peri Peri Fries",120],
["Mocktail Blue",140],["Mocktail Red",140],
["Coke",50],["Sprite",50],
["Water Bottle",20],
["Ice Cream Vanilla",80],["Chocolate Ice Cream",90],
["Brownie",120],["Cake Slice",130],
["Grilled Chicken",260],["Tandoori Chicken",300],
["Butter Chicken",260],["Paneer Butter Masala",220],
["Dal Tadka",150],["Jeera Rice",120],
["Roti",20],["Butter Naan",40],
["Garlic Naan",50],["Paratha",40],
["Chicken Soup",120],["Veg Soup",100],
["Salad",90],["Fruit Salad",120],
["Milkshake Chocolate",150],["Milkshake Strawberry",150],
["Lassi",100],["Cold Coffee",120]
];

/* LOAD MENU */
const menu=document.getElementById("menu");

items.forEach(item=>{
menu.innerHTML+=`
<div class="card">
<img src="https://source.unsplash.com/300x200/?food,${item[0]}">
<div class="card-content">
<h3>${item[0]}</h3>
<p class="price">₹${item[1]}</p>
<button onclick="addCart('${item[0]}',${item[1]})">Add to Cart</button>
</div>
</div>
`;
});

/* CART */
function addCart(name,price){
cart.push({name,price});
total+=price;
render();
}

function render(){
let html="";
cart.forEach((c,i)=>{
html+=`${c.name} ₹${c.price} <button onclick="removeItem(${i})">X</button><br>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function removeItem(i){
total-=cart[i].price;
cart.splice(i,1);
render();
}

</script>

</body>
</html>
