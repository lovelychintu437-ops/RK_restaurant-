<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RK Restaurant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    h1 {
      text-align: center;
      color: gold;
      font-size: 50px;
      margin-top: 40px;
    }

    h2 {
      border-bottom: 1px solid gray;
      padding-bottom: 5px;
    }

    .section {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #111;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .card div {
      padding: 10px;
    }

    .price {
      color: gold;
    }
  </style>
</head>

<body>

<h1>RK RESTAURANT</h1>

<div id="menu"></div>

<script>
const menuData = {
  "Biryani": ["Chicken Biryani","Mutton Biryani","Egg Biryani","Veg Biryani","Paneer Biryani","Special Biryani"],
  "Non-Veg": ["Chicken Curry","Butter Chicken","Chicken Fry","Kadai Chicken","Chicken Masala","Chicken Roast"],
  "Veg": ["Paneer Butter Masala","Dal Fry","Mix Veg","Aloo Curry","Veg Kolhapuri","Veg Curry"],
  "Fast Food": ["Burger","Pizza","French Fries","Sandwich","Chicken 65","Noodles"],
  "Desserts": ["Gulab Jamun","Ice Cream","Brownie","Rasgulla","Falooda","Cake"],
  "Drinks": ["Mocktail","Cool Drinks","Milkshake","Cold Coffee","Tea","Lemon Soda"]
};

const image = "https://picsum.photos/400/300"; // stable working

const menuDiv = document.getElementById("menu");

Object.keys(menuData).forEach(category => {

  let section = document.createElement("div");
  section.className = "section";

  let title = document.createElement("h2");
  title.innerText = category;
  section.appendChild(title);

  let grid = document.createElement("div");
  grid.className = "grid";

  menuData[category].forEach(item => {
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${image}?random=${Math.random()}">
      <div>
        <h3>${item}</h3>
        <p class="price">₹${Math.floor(100 + Math.random()*200)}</p>
      </div>
    `;

    grid.appendChild(card);
  });

  section.appendChild(grid);
  menuDiv.appendChild(section);
});
</script>

</body>
</html>
