<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Restaurant | Luxury Dining</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0a;
  color:white;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,0.6);
  padding:15px;
  text-align:center;
  z-index:1000;
}
nav a{
  color:gold;
  margin:20px;
  text-decoration:none;
  font-weight:500;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://source.unsplash.com/1600x900/?fine-dining,restaurant') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.hero h1{
  font-size:65px;
  color:gold;
}
.hero p{
  font-size:20px;
  opacity:0.9;
}

/* SECTION */
.section{
  padding:80px 20px;
}

/* CATEGORY TABS */
.tabs{
  display:flex;
  gap:10px;
  overflow:auto;
  margin-bottom:20px;
}
.tab{
  background:#1a1a1a;
  padding:10px 20px;
  border-radius:30px;
  cursor:pointer;
}
.tab:hover{
  background:gold;
  color:black;
}

/* MENU CARDS */
.menu-row{
  display:flex;
  overflow-x:auto;
  gap:20px;
}
.card{
  min-width:260px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}
.card-content{
  padding:15px;
}
.card h3{
  margin:0;
}
.price{
  color:gold;
  margin:5px 0;
}
button{
  background:gold;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

/* CHEF SPECIAL */
.special{
  background:linear-gradient(45deg,gold,#ffcc00);
  color:black;
  padding:3px 8px;
  font-size:12px;
  border-radius:5px;
}

/* CART */
.cart{
  position:fixed;
  right:20px;
  bottom:20px;
  width:280px;
  background:#111;
  padding:15px;
  border-radius:15px;
  max-height:350px;
  overflow:auto;
}
.cart h3{color:gold}

/* FORM */
.form{
  max-width:400px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:15px;
}
input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}
.btn{
  background:gold;
  padding:10px;
  border:none;
  width:100%;
}

h2{color:gold}

</style>
</head>

<body>

<nav>
<a href="#menu">Menu</a>
<a href="#order">Order</a>
</nav>

<div class="hero">
<h1>RK Restaurant</h1>
<p>Premium Dining Experience on NH65</p>
</div>

<!-- MENU -->
<div class="section" id="menu">

<h1 style="text-align:center">🍽️ Our Menu</h1>

<div class="tabs">
<div class="tab" onclick="scrollToCat('biryani')">Biryani</div>
<div class="tab" onclick="scrollToCat('starters')">Starters</div>
<div class="tab" onclick="scrollToCat('fastfood')">Fast Food</div>
<div class="tab" onclick="scrollToCat('drinks')">Drinks</div>
<div class="tab" onclick="scrollToCat('desserts')">Desserts</div>
</div>

<div id="menuContent"></div>

</div>

<!-- ORDER -->
<div class="section" id="order">
<h1>🧾 Order & Reservation</h1>

<div class="form">
<form onsubmit="confirmOrder(event)">

<input placeholder="Your Name" required>

<select id="table">
<option value="no">No Table</option>
<option value="yes">Reserve Table</option>
</select>

<div id="tableBox" style="display:none;">
<input placeholder="No. of People">
<select><option>Lunch</option><option>Dinner</option></select>
</div>

<select required>
<option>Payment Method</option>
<option>UPI (Pre-order must pay)</option>
<option>Cash</option>
<option>Card</option>
</select>

<button class="btn">Confirm Order</button>

</form>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h4>Total ₹<span id="total">0</span></h4>
</div>

<script>

let cart=[];
let total=0;

const menuData={
biryani:[
["Chicken Biryani",220,true],
["Mutton Biryani",280,true],
["Paneer Biryani",190,false]
],
starters:[
["Chicken 65",180,true],
["Paneer Tikka",160,false]
],
fastfood:[
["Burger",120,false],
["Pizza",250,true]
],
drinks:[
["Mocktail",140,false],
["Coke",50,false]
],
desserts:[
["Ice Cream",80,false],
["Cake",120,true]
]
};

const menuDiv=document.getElementById("menuContent");

for(let cat in menuData){

menuDiv.innerHTML+=`<h2 id="${cat}">${cat.toUpperCase()}</h2><div class="menu-row">`;

menuData[cat].forEach(item=>{
menuDiv.innerHTML+=`
<div class="card">
<img src="https://source.unsplash.com/300x200/?${item[0]}">
<div class="card-content">
<h3>${item[0]} ${item[2]?'<span class="special">Chef Special</span>':''}</h3>
<p class="price">₹${item[1]}</p>
<button onclick="addCart('${item[0]}',${item[1]})">Add to Cart</button>
</div>
</div>`;
});

menuDiv.innerHTML+="</div>";
}

/* CART */
function addCart(name,price){
cart.push({name,price});
total+=price;
render();
}

function render(){
let html="";
cart.forEach((c,i)=>{
html+=`${c.name} ₹${c.price} <button onclick="removeItem(${i})">X</button><br>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function removeItem(i){
total-=cart[i].price;
cart.splice(i,1);
render();
}

/* SCROLL */
function scrollToCat(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* TABLE */
document.getElementById("table").onchange=function(){
document.getElementById("tableBox").style.display=this.value=="yes"?"block":"none";
}

/* ORDER */
function confirmOrder(e){
e.preventDefault();
if(cart.length===0){
alert("Add items first!");
return;
}
alert("Order Confirmed! ₹"+total);
}

</script>

</body>
</html>
