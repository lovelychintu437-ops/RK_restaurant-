<!DOCTYPE html>
<html>
<head>
  <title>RK Restaurant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero h1 {
      font-size: 50px;
      color: gold;
    }

    .section {
      padding: 30px;
    }

    h2 {
      border-bottom: 1px solid gray;
      padding-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 15px;
    }

    .card {
      background: #111;
      border-radius: 10px;
      overflow: hidden;
    }

    .img-box {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      background: #222;
    }

    .card div {
      padding: 10px;
    }

    .price {
      color: gold;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 5px 10px;
      margin-top: 5px;
      cursor: pointer;
    }

    .cart {
      background: #111;
      padding: 20px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>RK RESTAURANT</h1>
  <p>Premium Highway Dining</p>
</div>

<div id="menu"></div>

<div class="cart">
  <h2>Your Order</h2>
  <div id="cartItems"></div>
  <p id="total"></p>
  <button>Pre-Order & Pay</button>
</div>

<script>

const menuData = {
  "Biryani": ["Chicken Biryani","Mutton Biryani","Egg Biryani","Veg Biryani","Paneer Biryani"],
  "Non-Veg": ["Chicken Curry","Butter Chicken","Kadai Chicken","Chicken Fry","Chicken Masala"],
  "Veg": ["Paneer Butter Masala","Dal Fry","Mix Veg Curry","Aloo Curry","Veg Kolhapuri"],
  "FastFood": ["Burger","Pizza","French Fries","Chicken 65","Sandwich"],
  "Desserts": ["Gulab Jamun","Ice Cream","Brownie","Rasgulla","Falooda"],
  "Drinks": ["Mocktail","Cool Drinks","Milkshake","Cold Coffee","Tea"]
};

const emojis = {
  "Biryani": "🍛",
  "Non-Veg": "🍗",
  "Veg": "🥗",
  "FastFood": "🍔",
  "Desserts": "🍰",
  "Drinks": "🥤"
};

let cart = [];

function updateCart() {
  let cartDiv = document.getElementById("cartItems");
  let totalDiv = document.getElementById("total");

  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    cartDiv.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
    total += item.price;
  });

  totalDiv.innerText = "Total: ₹" + total;
}

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

const menuDiv = document.getElementById("menu");

Object.keys(menuData).forEach(category => {

  let section = document.createElement("div");
  section.className = "section";

  let title = document.createElement("h2");
  title.innerText = category;
  section.appendChild(title);

  let grid = document.createElement("div");
  grid.className = "grid";

  menuData[category].forEach(item => {

    let price = Math.floor(100 + Math.random()*200);

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="img-box">${emojis[category]}</div>
      <div>
        <h3>${item}</h3>
        <p class="price">₹${price}</p>
        <button onclick="addToCart('${item}', ${price})">Add</button>
      </div>
    `;

    grid.appendChild(card);
  });

  section.appendChild(grid);
  menuDiv.appendChild(section);

});

</script>

</body>
</html>
