<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Restaurant | Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://source.unsplash.com/1600x900/?luxury-restaurant') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.hero h1{font-size:60px;color:gold}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  text-align:center;
  padding:15px;
}
nav a{color:gold;margin:15px;text-decoration:none}

/* SECTION */
.section{padding:60px 20px}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  backdrop-filter:blur(8px);
  transition:0.3s;
}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:180px;object-fit:cover}
.card h3{padding:10px}
.card p{color:gold;padding:0 10px}
.card button{
  margin:10px;
  background:gold;
  border:none;
  padding:8px;
  width:90%;
  border-radius:10px;
}

/* CART */
.cart{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#111;
  padding:15px;
  border-radius:15px;
  width:260px;
  max-height:300px;
  overflow:auto;
}
.cart h3{color:gold}

/* FORM */
.form{
  max-width:400px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
}
input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}
.btn{
  background:gold;
  padding:10px;
  border:none;
  width:100%;
}

h2{color:gold;margin-top:40px}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>RK Restaurant</h1>
<p>Luxury Dining Experience on NH65</p>
</div>

<!-- NAV -->
<nav>
<a href="#menu">Menu</a>
<a href="#order">Order</a>
</nav>

<!-- MENU -->
<div class="section" id="menu"></div>

<!-- ORDER -->
<div class="section" id="order">
<h1>🧾 Order & Reservation</h1>

<div class="form">
<form onsubmit="confirmOrder(event)">

<input placeholder="Your Name" required>

<select id="table">
<option value="no">No Table</option>
<option value="yes">Reserve Table</option>
</select>

<div id="tableBox" style="display:none;">
<input placeholder="No. of People">
<select><option>Lunch</option><option>Dinner</option></select>
</div>

<select required>
<option>Payment Method</option>
<option>UPI (Pre-order must pay)</option>
<option>Cash</option>
<option>Card</option>
</select>

<button class="btn">Confirm Order</button>

</form>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h4>Total ₹<span id="total">0</span></h4>
</div>

<script>

let cart=[];
let total=0;

/* MENU DATA */
const menuData = {
"Biryani 🍛":[
["Chicken Biryani",220],
["Mutton Biryani",280],
["Egg Biryani",180],
["Veg Biryani",150],
["Paneer Biryani",190]
],

"Starters 🔥":[
["Chicken 65",180],
["Chicken Lollipop",200],
["Chicken Wings",220],
["Paneer Tikka",160],
["Gobi Manchurian",140],
["Chilli Chicken",210]
],

"Fast Food 🍔":[
["Burger",120],
["Pizza",250],
["Sandwich",100],
["Shawarma",130],
["French Fries",90],
["Noodles",150],
["Fried Rice",160]
],

"Mocktails 🍹":[
["Virgin Mojito",120],
["Blue Lagoon",140],
["Strawberry Mocktail",150],
["Mint Cooler",110]
],

"Cool Drinks 🥤":[
["Coke",50],
["Sprite",50],
["Thumbs Up",50],
["Pepsi",50]
],

"Desserts 🍨":[
["Ice Cream",80],
["Brownie",120],
["Cake",150],
["Falooda",140]
],

"Veg Main Course 🥗":[
["Paneer Butter Masala",180],
["Kaju Curry",220],
["Dal Tadka",120],
["Veg Curry",150]
],

"Non-Veg Main Course 🍗":[
["Butter Chicken",240],
["Chicken Curry",220],
["Mutton Curry",280],
["Fish Curry",260]
]
};

/* RENDER MENU */
const menuDiv = document.getElementById("menu");

menuDiv.innerHTML = "<h1>🍽️ Premium Menu</h1>";

for(let category in menuData){
menuDiv.innerHTML += `<h2>${category}</h2><div class="menu">`;

menuData[category].forEach(item=>{
menuDiv.innerHTML += `
<div class="card">
<img src="https://source.unsplash.com/300x200/?food,${item[0]}">
<h3>${item[0]}</h3>
<p>₹${item[1]}</p>
<button onclick="addCart('${item[0]}',${item[1]})">Add</button>
</div>`;
});

menuDiv.innerHTML += "</div>";
}

/* CART */
function addCart(item,price){
cart.push({item,price});
total+=price;
render();
}

function removeItem(i){
total-=cart[i].price;
cart.splice(i,1);
render();
}

function render(){
let html="";
cart.forEach((c,i)=>{
html+=`${c.item} ₹${c.price} <button onclick="removeItem(${i})">X</button><br>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* TABLE */
document.getElementById("table").onchange=function(){
document.getElementById("tableBox").style.display=this.value=="yes"?"block":"none";
}

/* ORDER */
function confirmOrder(e){
e.preventDefault();
if(cart.length==0){
alert("Add items first!");
return;
}
alert("✅ Order Confirmed!\nTotal ₹"+total);
}

</script>

</body>
</html>
