<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Restaurant | Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://source.unsplash.com/1600x900/?luxury-restaurant') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.hero h1{font-size:60px;color:gold}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  text-align:center;
  padding:15px;
}
nav a{color:gold;margin:15px;text-decoration:none}

/* SECTION */
.section{padding:60px 20px}

/* CATEGORY TABS */
.tabs{
  display:flex;
  overflow:auto;
  gap:10px;
  padding:10px 0;
}
.tab{
  padding:10px 20px;
  background:#1a1a1a;
  border-radius:20px;
  cursor:pointer;
}
.tab:hover{background:gold;color:black}

/* MENU */
.category-section{margin-top:40px}
.menu{
  display:flex;
  overflow-x:auto;
  gap:20px;
}
.card{
  min-width:220px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  backdrop-filter:blur(8px);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card h3{padding:10px}
.card p{color:gold;padding:0 10px}
.card button{
  margin:10px;
  background:gold;
  border:none;
  padding:8px;
  width:90%;
  border-radius:10px;
}

/* CART */
.cart{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#111;
  padding:15px;
  border-radius:15px;
  width:260px;
  max-height:300px;
  overflow:auto;
}

/* FORM */
.form{
  max-width:400px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
}
input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}
.btn{
  background:gold;
  padding:10px;
  border:none;
  width:100%;
}

h2{color:gold}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>RK Restaurant</h1>
<p>Luxury Dining Experience on NH65</p>
</div>

<!-- NAV -->
<nav>
<a href="#menu">Menu</a>
<a href="#order">Order</a>
</nav>

<!-- MENU -->
<div class="section" id="menu">

<h1 style="text-align:center">🍽️ Premium Menu</h1>

<div class="tabs">
<button class="tab" onclick="scrollToCat('biryani')">Biryani</button>
<button class="tab" onclick="scrollToCat('starters')">Starters</button>
<button class="tab" onclick="scrollToCat('fastfood')">Fast Food</button>
<button class="tab" onclick="scrollToCat('drinks')">Drinks</button>
<button class="tab" onclick="scrollToCat('desserts')">Desserts</button>
<button class="tab" onclick="scrollToCat('veg')">Veg</button>
<button class="tab" onclick="scrollToCat('nonveg')">Non-Veg</button>
</div>

<div id="menuContent"></div>

</div>

<!-- ORDER -->
<div class="section" id="order">
<h1>🧾 Order & Reservation</h1>

<div class="form">
<form onsubmit="confirmOrder(event)">

<input placeholder="Your Name" required>

<select id="table">
<option value="no">No Table</option>
<option value="yes">Reserve Table</option>
</select>

<div id="tableBox" style="display:none;">
<input placeholder="No. of People">
<select><option>Lunch</option><option>Dinner</option></select>
</div>

<select required>
<option>Payment Method</option>
<option>UPI (Pre-order must pay)</option>
<option>Cash</option>
<option>Card</option>
</select>

<button class="btn">Confirm Order</button>

</form>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h4>Total ₹<span id="total">0</span></h4>
</div>

<script>

let cart=[];
let total=0;

/* MENU DATA */
const menuData = {
biryani:[
["Chicken Biryani",220],
["Mutton Biryani",280],
["Egg Biryani",180],
["Paneer Biryani",190]
],
starters:[
["Chicken 65",180],
["Chicken Lollipop",200],
["Paneer Tikka",160]
],
fastfood:[
["Burger",120],
["Pizza",250],
["Noodles",150]
],
drinks:[
["Mocktail",140],
["Coke",50],
["Sprite",50]
],
desserts:[
["Ice Cream",80],
["Cake",120]
],
veg:[
["Paneer Butter Masala",180],
["Dal Tadka",120]
],
nonveg:[
["Butter Chicken",240],
["Mutton Curry",280]
]
};

/* RENDER MENU */
const menuContent = document.getElementById("menuContent");

for(let cat in menuData){
menuContent.innerHTML += `
<div class="category-section" id="${cat}">
<h2>${cat.toUpperCase()}</h2>
<div class="menu">
${menuData[cat].map(item=>`
<div class="card">
<img src="https://source.unsplash.com/300x200/?food,${item[0]}">
<h3>${item[0]}</h3>
<p>₹${item[1]}</p>
<button onclick="addCart('${item[0]}',${item[1]})">Add</button>
</div>
`).join("")}
</div>
</div>
`;
}

/* CART */
function addCart(item,price){
cart.push({item,price});
total+=price;
render();
}

function removeItem(i){
total-=cart[i].price;
cart.splice(i,1);
render();
}

function render(){
let html="";
cart.forEach((c,i)=>{
html+=`${c.item} ₹${c.price} <button onclick="removeItem(${i})">X</button><br>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* SCROLL */
function scrollToCat(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* TABLE */
document.getElementById("table").onchange=function(){
document.getElementById("tableBox").style.display=this.value=="yes"?"block":"none";
}

/* ORDER */
function confirmOrder(e){
e.preventDefault();
if(cart.length==0){
alert("Add items first!");
return;
}
alert("✅ Order Confirmed!\nTotal ₹"+total);
}

</script>

</body>
</html>
